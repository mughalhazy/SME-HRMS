name: Deploy Validation

on:
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  deploy-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare env
        run: cp .env.example .env
      - name: Start deployment stack
        run: docker compose up -d --build
      - name: Verify API gateway readiness
        run: curl --fail http://localhost:8000/ready
      - name: Verify frontend readiness
        run: curl --fail http://localhost:3000/
      - name: Tear down
        if: always()
        run: docker compose down -v
